name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Build Docker image
        run: docker build -t atoms-demo:latest .

      - name: Save image to tar.gz
        run: docker save atoms-demo:latest | gzip > atoms-demo-image.tar.gz

      - name: Upload image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "atoms-demo-image.tar.gz,docker-compose.yml"
          target: "/deploy/atoms"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /deploy/atoms
            docker load < atoms-demo-image.tar.gz
            docker compose up -d --no-build
            docker image prune -f
