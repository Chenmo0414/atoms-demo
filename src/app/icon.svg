<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Electron orbits -->
  <ellipse cx="16" cy="16" rx="10" ry="4.5" stroke="white" stroke-width="1.2" stroke-opacity="0.7" fill="none"/>
  <ellipse cx="16" cy="16" rx="10" ry="4.5" stroke="white" stroke-width="1.2" stroke-opacity="0.7" fill="none" transform="rotate(60 16 16)"/>
  <ellipse cx="16" cy="16" rx="10" ry="4.5" stroke="white" stroke-width="1.2" stroke-opacity="0.7" fill="none" transform="rotate(120 16 16)"/>
  <!-- Nucleus -->
  <circle cx="16" cy="16" r="2.5" fill="white"/>
</svg>
